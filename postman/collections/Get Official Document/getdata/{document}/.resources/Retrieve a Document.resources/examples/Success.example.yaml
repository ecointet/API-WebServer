$kind: http-example
request:
  url: "{{baseUrl}}/getdata/:document"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: document
      value: birth_certificate
      description: The exact name of the document.
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "document": "birth_certificate",
        "content": "Official document content goes here."
      }
order: 1000
